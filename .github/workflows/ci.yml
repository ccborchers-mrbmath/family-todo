name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      # Note: `bun run lint` is intentionally not gated here. The existing
      # codebase is not Prettier-formatted (Lovable's flow doesn't run eslint),
      # so a repo-wide lint gate fails on pre-existing style debt unrelated to
      # any given change. Typecheck + build are the correctness gates.
